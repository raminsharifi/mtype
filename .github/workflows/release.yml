name: release

# Builds binaries for macOS (Apple Silicon and Intel) and Linux when a release
# is published, and attaches them to that release so people can download mtype
# without installing Rust.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: mtype-linux-x86_64
          - os: macos-13
            target: x86_64-apple-darwin
            asset: mtype-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: mtype-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Stage binary
        run: cp target/${{ matrix.target }}/release/mtype ${{ matrix.asset }}
      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ matrix.asset }}" --clobber
